<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0eb"/>
      <stop offset="100%" style="stop-color:#e8e0d8"/>
    </linearGradient>
    <linearGradient id="header" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="url(#bg)"/>

  <!-- Phone frame -->
  <rect x="250" y="20" width="300" height="460" rx="30" fill="#fff" stroke="#333" stroke-width="3" filter="url(#shadow)"/>

  <!-- Screen -->
  <rect x="265" y="50" width="270" height="400" rx="5" fill="#faf7f4"/>

  <!-- Header -->
  <rect x="265" y="50" width="270" height="60" fill="url(#header)" rx="5"/>
  <path d="M290 68 L280 84 L288 84 L284 100 L298 80 L290 80 Z" fill="url(#bolt)"/>
  <text x="305" y="78" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">BlitzPrep</text>
  <text x="305" y="95" fill="#aaa" font-family="Arial, sans-serif" font-size="8">Hızlı İngilizce, Güçlü Başlangıç</text>

  <!-- Streak badge -->
  <rect x="275" y="120" width="100" height="24" rx="12" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>
  <text x="285" y="136" fill="#F97316" font-family="Arial, sans-serif" font-size="11">🔥 5 gün seri!</text>

  <!-- Daily goal -->
  <rect x="275" y="152" width="250" height="40" rx="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="285" y="167" fill="#333" font-family="Arial, sans-serif" font-size="10" font-weight="bold">🎯 Günlük Hedef</text>
  <text x="490" y="167" fill="#999" font-family="Arial, sans-serif" font-size="9">12/20</text>
  <rect x="285" y="174" width="230" height="8" rx="4" fill="#f0f0f0"/>
  <rect x="285" y="174" width="138" height="8" rx="4" fill="#10b981"/>

  <!-- Stats -->
  <rect x="275" y="200" width="78" height="50" rx="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="314" y="220" fill="#10b981" font-family="Arial, sans-serif" font-size="16" font-weight="bold">47</text>
  <text x="314" y="240" fill="#999" font-family="Arial, sans-serif" font-size="8">Öğrenilen</text>

  <rect x="361" y="200" width="78" height="50" rx="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="400" y="220" fill="#3b82f6" font-family="Arial, sans-serif" font-size="16" font-weight="bold">82%</text>
  <text x="400" y="240" fill="#999" font-family="Arial, sans-serif" font-size="8">Doğruluk</text>

  <rect x="447" y="200" width="78" height="50" rx="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="486" y="220" fill="#ef4444" font-family="Arial, sans-serif" font-size="16" font-weight="bold">156</text>
  <text x="486" y="240" fill="#999" font-family="Arial, sans-serif" font-size="8">Toplam</text>

  <!-- Module cards -->
  <rect x="275" y="260" width="250" height="36" rx="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <rect x="283" y="266" width="24" height="24" rx="4" fill="#3b82f6"/>
  <text x="315" y="282" fill="#333" font-family="Arial, sans-serif" font-size="11" font-weight="bold">📚 Kelime Kartları</text>

  <rect x="275" y="302" width="250" height="36" rx="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <rect x="283" y="308" width="24" height="24" rx="4" fill="#10b981"/>
  <text x="315" y="324" fill="#333" font-family="Arial, sans-serif" font-size="11" font-weight="bold">💬 Senaryolar</text>

  <rect x="275" y="344" width="250" height="36" rx="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <rect x="283" y="350" width="24" height="24" rx="4" fill="#7c3aed"/>
  <text x="315" y="366" fill="#333" font-family="Arial, sans-serif" font-size="11" font-weight="bold">🗣️ Konuşma Pratiği</text>

  <rect x="275" y="386" width="250" height="36" rx="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <rect x="283" y="392" width="24" height="24" rx="4" fill="#059669"/>
  <text x="315" y="408" fill="#333" font-family="Arial, sans-serif" font-size="11" font-weight="bold">🧠 Gramer</text>

  <!-- Bottom nav -->
  <rect x="265" y="430" width="270" height="20" fill="#fff" stroke-top="#333" stroke-width="1"/>
  <text x="280" y="444" fill="#333" font-family="Arial, sans-serif" font-size="7">🏠</text>
  <text x="320" y="444" fill="#333" font-family="Arial, sans-serif" font-size="7">📚</text>
  <text x="360" y="444" fill="#333" font-family="Arial, sans-serif" font-size="7">💬</text>
  <text x="400" y="444" fill="#333" font-family="Arial, sans-serif" font-size="7">✏️</text>
  <text x="440" y="444" fill="#333" font-family="Arial, sans-serif" font-size="7">🧠</text>
  <text x="480" y="444" fill="#333" font-family="Arial, sans-serif" font-size="7">🎯</text>

  <!-- Floating elements - left side -->
  <text x="30" y="100" fill="#333" font-family="Arial, sans-serif" font-size="28" font-weight="bold">⚡ BlitzPrep</text>
  <text x="30" y="130" fill="#666" font-family="Arial, sans-serif" font-size="14">Hızlı İngilizce,</text>
  <text x="30" y="150" fill="#666" font-family="Arial, sans-serif" font-size="14">Güçlü Başlangıç</text>

  <!-- Feature list -->
  <text x="30" y="210" fill="#333" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Özellikler</text>

  <rect x="30" y="225" width="8" height="8" rx="2" fill="#3b82f6"/>
  <text x="48" y="234" fill="#333" font-family="Arial, sans-serif" font-size="12">~170 kelime, akıllı tekrar</text>

  <rect x="30" y="250" width="8" height="8" rx="2" fill="#10b981"/>
  <text x="48" y="259" fill="#333" font-family="Arial, sans-serif" font-size="12">20 diyalog senaryosu</text>

  <rect x="30" y="275" width="8" height="8" rx="2" fill="#f59e0b"/>
  <text x="48" y="284" fill="#333" font-family="Arial, sans-serif" font-size="12">~150 cümle yazma pratiği</text>

  <rect x="30" y="300" width="8" height="8" rx="2" fill="#7c3aed"/>
  <text x="48" y="309" fill="#333" font-family="Arial, sans-serif" font-size="12">10 konuşma senaryosu</text>

  <rect x="30" y="325" width="8" height="8" rx="2" fill="#059669"/>
  <text x="48" y="334" fill="#333" font-family="Arial, sans-serif" font-size="12">5 gramer konusu, ~57 soru</text>

  <rect x="30" y="350" width="8" height="8" rx="2" fill="#ef4444"/>
  <text x="48" y="359" fill="#333" font-family="Arial, sans-serif" font-size="12">Quiz modu (kelime/gramer/karışık)</text>

  <!-- Tech badges -->
  <text x="30" y="410" fill="#333" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Teknolojiler</text>
  <rect x="30" y="420" width="70" height="28" rx="14" fill="#61dafb" opacity="0.2" stroke="#61dafb" stroke-width="1"/>
  <text x="65" y="438" fill="#61dafb" font-family="Arial, sans-serif" font-size="10" font-weight="bold">React</text>

  <rect x="110" y="420" width="70" height="28" rx="14" fill="#3178c6" opacity="0.2" stroke="#3178c6" stroke-width="1"/>
  <text x="145" y="438" fill="#3178c6" font-family="Arial, sans-serif" font-size="10" font-weight="bold">TypeScript</text>

  <rect x="190" y="420" width="60" height="28" rx="14" fill="#646cff" opacity="0.2" stroke="#646cff" stroke-width="1"/>
  <text x="220" y="438" fill="#646cff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Vite</text>
</svg>
